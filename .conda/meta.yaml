# For conda build
package:
  name: pysidt
  version: 1.1.0

source:
  path: ../

build:
  noarch: python
  number: {{ environ.get('GIT_DESCRIBE_NUMBER', 0) }}

requirements:
  build:
    - python
  host:
    - python
    - jupyter
    - matplotlib
    - multiprocess
    - nose
    - numpy
    - pydot
    - rmgmolecule >=0.3.0
    - scikit-learn
    - scipy
  run:
    - python
    - jupyter
    - matplotlib
    - multiprocess
    - nose
    - {{ pin_compatible('numpy') }}
    - pydot
    - rmgmolecule >=0.3.0
    - scikit-learn
    - scipy
test:
  imports:
    - pysidt

about:
  home: https://github.com/zadorlab/PySIDT
  license: MIT
  summary: "Subgraph Isomorphic Decision Trees for Molecular Property Prediction"
